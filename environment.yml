name: vipaint
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch
      - torchvision
      - transformers
      - safetensors
      - numpy
      - fire
      - pillow
      - einops
      - sentencepiece
      - protobuf
      - webdataset
      - tqdm
      - matplotlib
      - lpips